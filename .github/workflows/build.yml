name: Build Cross-Platform Executables

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact_name: baseball-cli.exe
            artifact_path: bin/Release/net6.0/win-x64/publish/baseball-cli.exe
          
          - os: ubuntu-latest
            rid: linux-x64
            artifact_name: baseball-cli
            artifact_path: bin/Release/net6.0/linux-x64/publish/baseball-cli
          
          - os: macos-latest
            rid: osx-x64
            artifact_name: baseball-cli-osx-x64
            artifact_path: bin/Release/net6.0/osx-x64/publish/baseball-cli
          
          - os: macos-latest
            rid: osx-arm64
            artifact_name: baseball-cli-osx-arm64
            artifact_path: bin/Release/net6.0/osx-arm64/publish/baseball-cli

    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '6.0.x'
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet publish -c Release -r ${{ matrix.rid }} --self-contained
    
    - name: Make Linux executable
      if: matrix.os == 'ubuntu-latest'
      run: chmod +x ${{ matrix.artifact_path }}
    
    - name: Make macOS executable
      if: matrix.os == 'macos-latest'
      run: chmod +x ${{ matrix.artifact_path }}
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: baseball-cli-${{ matrix.rid }}
        path: ${{ matrix.artifact_path }}
        retention-days: 30

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
    
    - name: Prepare release assets
      run: |
        mkdir -p release
        cp baseball-cli-win-x64/baseball-cli.exe release/baseball-cli-windows-x64.exe
        cp baseball-cli-linux-x64/baseball-cli release/baseball-cli-linux-x64
        cp baseball-cli-osx-x64/baseball-cli release/baseball-cli-macos-x64
        cp baseball-cli-osx-arm64/baseball-cli release/baseball-cli-macos-arm64
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: release/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
